name: hotfix
description: Quick fix workflow: preflight, read, code, test, verify, commit, vault-updates
steps:
  - name: preflight
    agent: preflight
  - name: read
    agent: reader
  - name: code
    agent: coder
    input: [read.output]
  - name: test
    agent: tester
    input: [code.output]
    gate: tests-pass
    onFail: code
  - name: verify
    agent: verifier
    input: [code.output]
    gate: user-approve
    onFail: code
  - name: commit
    agent: committer
    input: [code.output]
  - name: vault-updates
    agent: vault-updates
